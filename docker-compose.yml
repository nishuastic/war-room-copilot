services:
  livekit-server:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0 --node-ip 0.0.0.0
    ports:
      - "7880:7880"   # WebSocket + HTTP API
      - "7881:7881"   # WebRTC TCP
      - "50000-50060:50000-50060/udp"  # WebRTC UDP (ICE candidates)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent:
    build: .
    env_file: .env
    environment:
      # Override LIVEKIT_URL to use Docker-internal DNS
      - LIVEKIT_URL=ws://livekit-server:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
    volumes:
      - ./speakers.json:/app/speakers.json        # voiceprint persistence
      - /var/run/docker.sock:/var/run/docker.sock  # GitHub MCP needs Docker
    depends_on:
      livekit-server:
        condition: service_healthy
    restart: unless-stopped
