# LiveKit RTC configuration for Docker Desktop on Mac
# IMPORTANT: use_external_ip MUST be false or --node-ip is silently ignored (livekit/livekit#4049)
# node_ip is set via --node-ip CLI flag from NODE_IP env var in .env

# Auto-destroy rooms 60s after the last participant leaves.
# Prevents stale rooms from blocking agent dispatch on reconnect.
room:
  empty_timeout: 60

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50060
  use_external_ip: false
  enable_loopback_candidate: true
