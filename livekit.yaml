# LiveKit RTC configuration for Docker Desktop on Mac
# node_ip must be your host's LAN IP (reachable from both browser and agent container)
# Find it with: ipconfig getifaddr en0
# IMPORTANT: use_external_ip MUST be false or node_ip is silently ignored
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50060
  use_external_ip: false
  node_ip: 10.110.59.48
  enable_loopback_candidate: true
